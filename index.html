<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main>
      <article>
        <figure class="item-img">
          <img
            src="./images/image-product-mobile.jpg"
            alt="A perfume from Chanel"
          />
        </figure>
        <section class="item-content">
          <header>
            <p class="item-category">Perfume</p>
            <h2>Gabrielle Essence Eau De Parfum</h2>
            <p class="item-description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.</p>
          </header>
          <div class="item-price">
            $149.99
            <span>$169.99</span>
          </div>
          <button><img src="./images/icon-cart.svg" alt="add to cart" />Add to Cart</button>
        </section>
      </article>

      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Duc Nguyen</a>.
      </footer>
    </main>
  </body>
</html>
