<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main>
      <article>
        <figure class="item-img">
          <picture>
            <source media="(min-width: 48rem)" srcset="./images/image-product-desktop.jpg">
            <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum bottle">
          </picture>
        </figure>
        <section class="item-content">
          <header>
            <p class="item-category">Perfume</p>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p class="item-description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.</p>
          </header>
          <div class="item-price">
              $149.99
            <del>
              $169.99
            </del>
            <span class="sr-only">Current price $149.99, was $169.99</span> <!-- screen-reader-only clarification -->
          </div>
          <button type="button" aria-label="Add item to cart"><img src="./images/icon-cart.svg" alt="" />Add to Cart</button>
        </section>
      </article>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/DucNguyenJP89/" target="_blank" rel="noopener noreferrer">Duc Nguyen</a>.
    </footer>
  </body>
</html>
